<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lively Pastel Watermelon Garden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./clicker.js"></script>
    <style>
      /* Repeating Picket Fence */
      .bg-fence {
        background-image: repeating-linear-gradient(
          to right,
          transparent,
          transparent 20px,
          rgba(255, 255, 255, 0.95) 20px,
          rgba(255, 255, 255, 0.95) 35px
        );
      }

      /* --- Custom Animations --- */
      @keyframes pulse-grow {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
      }
      .animate-melon {
        animation: pulse-grow 4s ease-in-out infinite;
      }

      @keyframes drift {
        0% {
          transform: translateX(0px);
        }
        50% {
          transform: translateX(30px);
        }
        100% {
          transform: translateX(0px);
        }
      }
      .animate-drift {
        animation: drift 8s ease-in-out infinite;
      }
      .animate-drift-slow {
        animation: drift 14s ease-in-out infinite reverse;
      }

      @keyframes fly-across {
        0% {
          transform: translate(-10vw, 15vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        40% {
          transform: translate(40vw, 5vh) rotate(-10deg);
        }
        60% {
          transform: translate(60vw, 10vh) rotate(5deg);
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(110vw, -5vh) rotate(-15deg);
          opacity: 0;
        }
      }
      .animate-fly-1 {
        animation: fly-across 18s linear infinite;
      }
      .animate-fly-2 {
        animation: fly-across 25s linear infinite;
        animation-delay: 7s;
      }
      .animate-fly-3 {
        animation: fly-across 20s linear infinite;
        animation-delay: 3s;
      }

      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .animate-spin-slow {
        animation: spin-slow 60s linear infinite;
      }

      @keyframes sway {
        0%,
        100% {
          transform: rotate(-8deg);
        }
        50% {
          transform: rotate(8deg);
        }
      }
      .animate-sway {
        animation: sway 4s ease-in-out infinite;
        transform-origin: bottom center;
      }
      .animate-sway-delayed {
        animation: sway 5s ease-in-out infinite 2s;
        transform-origin: bottom center;
      }

      @keyframes hop {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }
      .animate-hop {
        animation: hop 1.5s ease-in-out infinite;
      }
      .animate-hop-delayed {
        animation: hop 2s ease-in-out infinite 1s;
      }

      /* Sparkle Pop Animation */
      @keyframes pop-out {
        0% {
          transform: scale(0.5);
          opacity: 1;
        }
        100% {
          transform: scale(1.5) translateY(-20px);
          opacity: 0;
        }
      }
      .animate-pop {
        animation: pop-out 0.4s ease-out forwards;
      }
    </style>
  </head>
  <body class="font-sans h-screen overflow-hidden bg-pink-100 text-slate-700">
    <div class="flex flex-col md:flex-row h-full">
      <div
        class="relative flex-1 bg-gradient-to-b from-sky-300 via-fuchsia-200 to-teal-100 flex flex-col items-center justify-end pb-12 md:pb-32 overflow-hidden shadow-[inset_-10px_0_20px_rgba(0,0,0,0.05)]"
      >
        <div
          class="absolute top-0 left-0 w-full flex justify-around text-6xl z-10 opacity-90 -mt-3 drop-shadow-md"
        >
          <span class="animate-sway">🌿</span>
          <span class="animate-sway-delayed mt-6">🌿</span>
          <span class="animate-sway">🌿</span>
          <span class="animate-sway-delayed mt-4">🌿</span>
          <span class="animate-sway">🌿</span>
        </div>

        <div
          class="absolute top-12 left-12 w-32 h-32 flex items-center justify-center animate-spin-slow z-0"
        >
          <div
            class="w-28 h-28 bg-yellow-300 rounded-full shadow-[0_0_80px_rgba(253,224,71,0.8)]"
          ></div>
          <div class="absolute text-7xl opacity-80">🌞</div>
        </div>

        <div
          class="absolute top-24 right-20 text-8xl text-white drop-shadow-lg animate-drift z-0"
        >
          ☁️
        </div>
        <div
          class="absolute top-12 right-56 text-6xl text-white drop-shadow-lg animate-drift-slow z-0"
        >
          ☁️
        </div>

        <div
          class="absolute top-0 left-0 text-5xl z-10 animate-fly-1 drop-shadow-md pointer-events-none"
        >
          🕊️
        </div>
        <div
          class="absolute top-10 left-0 text-5xl z-10 animate-fly-2 drop-shadow-md pointer-events-none"
        >
          🦋
        </div>
        <div
          class="absolute top-24 left-0 text-4xl z-10 animate-fly-3 drop-shadow-md pointer-events-none"
        >
          🐝
        </div>

        <div
          class="absolute bottom-40 md:bottom-56 w-full h-24 bg-fence z-0 border-b-4 border-white/90 shadow-md"
        ></div>

        <div
          class="absolute -bottom-4 -left-20 w-[140%] h-72 bg-teal-300 rounded-[100%] z-0 border-t-4 border-teal-400"
        >
          <span class="absolute top-8 left-1/5 text-6xl animate-sway">🌳</span>
          <span class="absolute top-12 left-1/2 text-5xl animate-sway-delayed"
            >🌲</span
          >
          <span class="absolute top-16 left-3/4 text-6xl animate-sway">🌳</span>
        </div>

        <div
          class="absolute -bottom-8 -right-10 w-[110%] h-64 bg-emerald-300 rounded-[100%] z-0 border-t-4 border-emerald-400"
        >
          <span
            class="absolute top-6 left-1/4 text-6xl animate-sway-delayed drop-shadow-sm"
            >🌻</span
          >
          <span
            class="absolute top-8 left-1/2 text-5xl animate-hop drop-shadow-sm"
            >🐇</span
          >
          <span
            class="absolute top-10 right-1/4 text-6xl animate-sway drop-shadow-sm"
            >🌸</span
          >
        </div>

        <div
          class="absolute -bottom-16 -left-10 w-[120%] h-56 bg-green-300 rounded-[100%] z-0 border-t-8 border-green-400 shadow-[inset_0_20px_20px_rgba(0,0,0,0.05)]"
        >
          <div
            class="absolute top-12 left-1/2 -translate-x-1/2 w-72 h-48 bg-amber-200/70 rounded-[100%] border-4 border-amber-300/50"
          ></div>
          <span
            class="absolute top-4 left-[15%] text-6xl animate-sway drop-shadow-md"
            >🌷</span
          >
          <span
            class="absolute top-14 left-10 text-5xl animate-hop-delayed drop-shadow-md"
            >🐸</span
          >
          <span
            class="absolute top-24 left-[22%] text-6xl drop-shadow-md animate-sway"
            >🍄</span
          >
          <span
            class="absolute top-16 right-[35%] text-5xl drop-shadow-md animate-drift"
            >🐌</span
          >
          <span class="absolute top-24 right-[15%] text-6xl drop-shadow-md"
            >🐈</span
          >
          <span
            class="absolute top-8 right-12 text-5xl drop-shadow-md animate-sway-delayed"
            >🦔</span
          >
        </div>

        <div
          class="absolute top-8 left-1/2 -translate-x-1/2 md:left-auto md:right-8 md:translate-x-0 bg-white/90 backdrop-blur-md p-6 rounded-3xl shadow-xl border-4 border-pink-300 text-center z-20 min-w-[300px] hover:scale-105 transition-transform"
        >
          <p
            class="text-sm text-pink-600 font-black uppercase tracking-widest mb-1 drop-shadow-sm"
          >
            Water Drops 💧
          </p>
          <h1 class="text-7xl font-black text-sky-500 mb-2 drop-shadow-md">
            <span id="score-display">0</span>
          </h1>
          <div
            class="bg-pink-100 text-pink-700 font-black px-5 py-2 rounded-full inline-block shadow-inner text-sm border-2 border-pink-200"
          >
            Flow: <span id="cps-display">0</span> / sec
          </div>
        </div>

        <div
          class="relative flex items-center justify-center mt-32 z-10 animate-melon"
        >
          <div
            class="absolute -bottom-8 w-[350px] h-28 bg-amber-800/30 rounded-[100%] blur-md z-0 mix-blend-multiply pointer-events-none"
          ></div>
          <div
            id="orbit-container"
            class="absolute inset-0 pointer-events-none z-10"
          ></div>

          <button
            id="planet-btn"
            class="relative z-20 w-80 h-80 bg-gradient-to-br from-rose-400 to-pink-500 rounded-full border-[18px] border-emerald-500 shadow-[inset_0_0_0_12px_rgba(255,255,255,0.95),0_20px_0_rgb(6,95,70),0_25px_20px_rgba(0,0,0,0.2)] hover:-translate-y-2 hover:shadow-[inset_0_0_0_12px_rgba(255,255,255,0.95),0_28px_0_rgb(6,95,70),0_35px_25px_rgba(0,0,0,0.2)] hover:brightness-105 active:translate-y-6 active:shadow-[inset_0_0_0_12px_rgba(255,255,255,0.95),0_0px_0_rgb(6,95,70),0_5px_10px_rgba(0,0,0,0.2)] flex items-center justify-center cursor-pointer transition-all duration-100 group overflow-visible"
          >
            <div
              class="absolute -top-10 right-4 w-20 h-20 bg-gradient-to-br from-lime-400 to-green-500 rounded-[0_100%_0_100%] rotate-[15deg] shadow-lg border-4 border-green-600 z-[-1] group-active:rotate-[35deg] transition-transform origin-bottom-left"
            >
              <div
                class="absolute inset-0 border-b-4 border-green-600/40 rounded-full rotate-45 translate-x-1 translate-y-3"
              ></div>
            </div>

            <div
              class="absolute top-2 right-14 w-6 h-6 bg-gradient-to-br from-white to-blue-200/80 rounded-[0_50%_50%_50%] rotate-[-45deg] shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.1),2px_2px_4px_rgba(0,0,0,0.1)] border border-white/80 group-active:translate-y-3 group-active:scale-75 transition-transform"
            ></div>

            <div
              class="absolute top-16 left-[25%] w-4 h-6 bg-slate-800 rounded-[50%_50%_45%_55%] rotate-[30deg] opacity-80 group-active:translate-y-1 transition-transform"
            ></div>
            <div
              class="absolute top-20 right-[25%] w-4 h-6 bg-slate-800 rounded-[50%_50%_45%_55%] rotate-[-40deg] opacity-80 group-active:translate-y-1 transition-transform"
            ></div>
            <div
              class="absolute bottom-24 left-[20%] w-4 h-6 bg-slate-800 rounded-[50%_50%_45%_55%] rotate-[-20deg] opacity-80 group-active:-translate-y-1 transition-transform"
            ></div>
            <div
              class="absolute bottom-20 right-[20%] w-4 h-6 bg-slate-800 rounded-[50%_50%_45%_55%] rotate-[45deg] opacity-80 group-active:-translate-y-1 transition-transform"
            ></div>
            <div
              class="absolute bottom-10 left-[50%] -translate-x-1/2 w-4 h-6 bg-slate-800 rounded-[50%_50%_45%_55%] opacity-80 group-active:-translate-y-1 transition-transform"
            ></div>

            <div
              class="font-black drop-shadow-xl z-10 flex flex-col items-center group-active:scale-95 transition-transform w-full"
            >
              <div class="group-active:hidden flex flex-col items-center">
                <span class="text-7xl mb-2 drop-shadow-xl animate-bounce"
                  >🍉</span
                >
                <span
                  class="text-5xl tracking-widest mt-1 text-white"
                  style="
                    text-shadow:
                      0 4px 0 #be123c,
                      0 -2px 0 #be123c,
                      2px 0 0 #be123c,
                      -2px 0 0 #be123c;
                  "
                  >SPLISH!</span
                >
              </div>

              <div
                class="hidden group-active:flex flex-col items-center relative"
              >
                <span class="absolute -top-12 -left-8 text-4xl animate-pop"
                  >✨</span
                >
                <span
                  class="absolute -top-4 -right-12 text-3xl animate-pop"
                  style="animation-delay: 0.05s"
                  >💦</span
                >
                <span
                  class="absolute bottom-6 -left-12 text-4xl animate-pop"
                  style="animation-delay: 0.1s"
                  >💧</span
                >
                <span
                  class="absolute -bottom-8 right-0 text-3xl animate-pop"
                  style="animation-delay: 0.15s"
                  >✨</span
                >

                <span class="text-7xl mb-2 drop-shadow-xl scale-110">💦</span>
                <span
                  class="text-5xl tracking-widest mt-1 text-cyan-100"
                  style="
                    text-shadow:
                      0 4px 0 #0284c7,
                      0 -2px 0 #0284c7,
                      2px 0 0 #0284c7,
                      -2px 0 0 #0284c7;
                  "
                  >SPLASH!</span
                >
              </div>
            </div>
          </button>
        </div>
      </div>

      <div
        class="w-full md:w-96 bg-pink-100 border-t-8 md:border-t-0 md:border-l-8 border-pink-300 flex flex-col h-1/2 md:h-full z-30 overflow-hidden shadow-2xl relative"
      >
        <div
          class="bg-pink-200 text-pink-700 p-6 relative z-10 border-b-4 border-pink-300 shadow-md"
        >
          <h2
            class="text-3xl font-black tracking-wide flex items-center gap-3 drop-shadow-sm"
          >
            <span class="text-4xl">🎀</span> Garden Shop
          </h2>
        </div>

        <div
          class="p-6 overflow-y-auto relative z-10 space-y-8 flex-1 bg-gradient-to-b from-pink-100 to-white"
        >
          <div>
            <h3
              class="text-pink-600 font-black uppercase tracking-widest mb-3 text-sm flex items-center gap-2"
            >
              <span class="text-xl">🌸</span> Current Gear
            </h3>
            <div
              class="border-4 border-pink-200 p-5 bg-white/90 rounded-3xl shadow-md hover:shadow-lg transition-shadow backdrop-blur-sm"
            >
              <p
                class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1"
              >
                Watering Power
              </p>
              <p class="text-4xl font-black text-sky-500 drop-shadow-sm">
                <span id="power-display">1</span>
                <span class="text-sm text-slate-500 font-bold"
                  >drop / click</span
                >
              </p>
            </div>
          </div>

          <div>
            <h3
              class="text-pink-600 font-black uppercase tracking-widest mb-3 text-sm flex items-center gap-2"
            >
              <span class="text-xl">🌷</span> Upgrades
            </h3>
            <div class="space-y-4" id="store-container">
              <button
                id="buy-stormtrooper-btn"
                class="w-full flex items-center justify-between p-5 bg-white/90 border-4 border-pink-200 rounded-3xl hover:border-pink-400 hover:bg-pink-50 hover:-translate-y-1 hover:shadow-xl active:translate-y-0 transition-all text-left group backdrop-blur-sm"
              >
                <div>
                  <h3
                    class="font-black text-slate-700 group-hover:text-pink-600 text-xl"
                  >
                    1. Bigger Can
                  </h3>
                  <p class="text-sm font-bold text-sky-500 mt-1">
                    +1 Drop / Click
                  </p>
                </div>
                <div class="text-right">
                  <p
                    class="font-black text-emerald-600 bg-emerald-100 px-3 py-1 rounded-xl border-2 border-emerald-300 shadow-inner text-lg"
                  >
                    💧 <span id="stormtrooper-cost">15</span>
                  </p>
                  <p
                    class="text-[11px] font-black text-slate-500 mt-2 uppercase tracking-widest bg-slate-100 inline-block px-2 rounded-md"
                  >
                    Owned:
                    <span id="stormtrooper-owned" class="text-slate-800"
                      >0</span
                    >
                  </p>
                </div>
              </button>

              <button
                id="buy-tie-btn"
                class="w-full flex items-center justify-between p-5 bg-white/90 border-4 border-pink-200 rounded-3xl hover:border-pink-400 hover:bg-pink-50 hover:-translate-y-1 hover:shadow-xl active:translate-y-0 transition-all text-left group backdrop-blur-sm"
              >
                <div>
                  <h3
                    class="font-black text-slate-700 group-hover:text-pink-600 text-xl"
                  >
                    2. Sprinkler
                  </h3>
                  <p class="text-sm font-bold text-sky-500 mt-1">
                    +1 Auto / sec
                  </p>
                </div>
                <div class="text-right">
                  <p
                    class="font-black text-emerald-600 bg-emerald-100 px-3 py-1 rounded-xl border-2 border-emerald-300 shadow-inner text-lg"
                  >
                    💧 <span id="tie-cost">100</span>
                  </p>
                  <p
                    class="text-[11px] font-black text-slate-500 mt-2 uppercase tracking-widest bg-slate-100 inline-block px-2 rounded-md"
                  >
                    Owned: <span id="tie-owned" class="text-slate-800">0</span>
                  </p>
                </div>
              </button>

              <button
                id="buy-atat-btn"
                class="w-full flex items-center justify-between p-5 bg-white/90 border-4 border-pink-200 rounded-3xl hover:border-pink-400 hover:bg-pink-50 hover:-translate-y-1 hover:shadow-xl active:translate-y-0 transition-all text-left group backdrop-blur-sm"
              >
                <div>
                  <h3
                    class="font-black text-slate-700 group-hover:text-pink-600 text-xl"
                  >
                    3. Drip System
                  </h3>
                  <p class="text-sm font-bold text-sky-500 mt-1">
                    +5 Auto / sec
                  </p>
                </div>
                <div class="text-right">
                  <p
                    class="font-black text-emerald-600 bg-emerald-100 px-3 py-1 rounded-xl border-2 border-emerald-300 shadow-inner text-lg"
                  >
                    💧 <span id="atat-cost">400</span>
                  </p>
                  <p
                    class="text-[11px] font-black text-slate-500 mt-2 uppercase tracking-widest bg-slate-100 inline-block px-2 rounded-md"
                  >
                    Owned: <span id="atat-owned" class="text-slate-800">0</span>
                  </p>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
