<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Pokemon collection</h1>
    <div
      id="pokemon-container"
      style="display: flex; flex-wrap: wrap; gap: 16px"
    ></div>
    <button
      id="add-pokemon"
      style="padding: 16px 16px; margin: 8px 8px; background-color: aquamarine; cursor: pointer;"
    >
      Add pokemon
    </button>
    <button
      id="remove-pokemon"
      style="padding: 16px 16px; margin: 8px 8px; background-color: pink; cursor: pointer;"
    >
      Remove pokemon
    </button>
    <script src="./pokemon.js"></script>
  </body>
</html>
